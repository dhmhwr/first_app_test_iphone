name: Build iOS IPA (Final Fix)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      # 关键修改：打正式 Release 包
      - name: Build iOS app (Release)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r 万能阅读器.ipa Payload/

      # 输出文件名改为：万能阅读器
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: 万能阅读器
          path: 万能阅读器.ipa